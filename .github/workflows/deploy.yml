name: Deploy portfólio para GitHub Pages

# Roda a cada push na main. Também pode ser disparado manualmente na aba Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita dois deploys rodando ao mesmo tempo — sempre finaliza o mais recente
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-app
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: react-app/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (inclui checagem de tipos via tsc -b)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato de build (dist/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: react-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
